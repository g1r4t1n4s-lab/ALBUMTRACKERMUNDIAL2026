<!DOCTYPE html>
<html lang='es'><head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no'>
<title>Álbum Mundial 2026</title><meta name='theme-color' content='#0A0F2C'>
<meta name='apple-mobile-web-app-capable' content='yes'>
<meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
<meta name='apple-mobile-web-app-title' content='Mundial 26'>
<meta name='mobile-web-app-capable' content='yes'>
<link rel='manifest' href='./manifest.json'>
<link rel='apple-touch-icon' href='./icons/apple-touch-icon.png'>
<link rel='icon' type='image/png' href='./icons/icon-192.png'>
<link rel='stylesheet' href='./app.css'>
</head><body><!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-bg">
    <div class="login-trophy">🏆</div>
    <h1 class="login-title">Mundial 2026</h1>
    <p class="login-subtitle">Álbum Tracker</p>
  </div>
  <div class="login-panel">
    <p class="pin-instruction" id="pin-instruction">Ingresá tu PIN</p>
    <div class="pin-display" id="pin-display">
      <span class="pin-dot" id="d0"></span>
      <span class="pin-dot" id="d1"></span>
      <span class="pin-dot" id="d2"></span>
      <span class="pin-dot" id="d3"></span>
    </div>
    <p id="forgot-pin-link" style="font-size:13px;color:var(--blue);text-decoration:underline;cursor:pointer;margin-bottom:1rem;display:none" onclick="openPinRecovery()">Olvidé mi PIN</p>
    <div class="numpad">
      <button class="num-btn" data-n="1">1</button>
      <button class="num-btn" data-n="2">2</button>
      <button class="num-btn" data-n="3">3</button>
      <button class="num-btn" data-n="4">4</button>
      <button class="num-btn" data-n="5">5</button>
      <button class="num-btn" data-n="6">6</button>
      <button class="num-btn" data-n="7">7</button>
      <button class="num-btn" data-n="8">8</button>
      <button class="num-btn" data-n="9">9</button>
      <button class="num-btn ghost" id="btn-reset" onclick="askReset()">✕</button>
      <button class="num-btn" data-n="0">0</button>
      <button class="num-btn del-btn" id="btn-del">⌫</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-trophy">🏆</span>
      <div>
        <div class="sidebar-name">Mundial 2026</div>
        <div class="sidebar-sub">Álbum Tracker</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="snav-btn active" data-tab="inicio" onclick="switchTab('inicio',this)">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
      </button>
      <button class="snav-btn" data-tab="paises" onclick="switchTab('paises',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Países
      </button>
      <button class="snav-btn" data-tab="especiales" onclick="switchTab('especiales',this)">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Especiales
      </button>
      <button class="snav-btn" data-tab="cracks" onclick="switchTab('cracks',this)">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Cracks
      </button>
      <button class="snav-btn" data-tab="costos" onclick="switchTab('costos',this)">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Costos
      </button>
      <button class="snav-btn" data-tab="canjear" onclick="switchTab('canjear',this)">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Canjear
      </button>
      <button class="snav-btn" onclick="openCanjeQR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/></svg>
        Canje con amigo
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="snav-btn" onclick="openScanner()">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Escanear figurita
      </button>
      <button class="snav-btn" data-tab="sincronizar" onclick="switchTab('sincronizar',this)">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar datos
      </button>
      <button class="snav-btn" onclick="lockApp()">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Bloquear
      </button>
    </div>
  </aside>

  <div class="app-main">
    <header class="topbar">
      <button class="topbar-menu" onclick="toggleMobileMenu()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title" id="topbar-title">Inicio</span>
      <button class="scan-fab-top" onclick="openScanner()" aria-label="Escanear figurita">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
    </header>
    <div class="tab-content">
      <div id="tab-inicio" class="tab-pane active"></div>
      <div id="tab-paises" class="tab-pane"></div>
      <div id="tab-especiales" class="tab-pane"></div>
      <div id="tab-cracks" class="tab-pane"></div>
      <div id="tab-costos" class="tab-pane"></div>
      <div id="tab-canjear" class="tab-pane"></div>
      <div id="tab-sincronizar" class="tab-pane"></div>
    </div>
    <nav class="bottom-nav">
      <button class="bnav active" data-tab="inicio" onclick="switchTab('inicio',this)">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span>
      </button>
      <button class="bnav" data-tab="paises" onclick="switchTab('paises',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><span>Países</span>
      </button>
      <button class="bnav" data-tab="costos" onclick="switchTab('costos',this)">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Costos</span>
      </button>
      <button class="bnav" data-tab="canjear" onclick="switchTab('canjear',this)">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span>Canjear</span>
      </button>
      <button class="bnav" data-tab="especiales" onclick="switchTab('especiales',this)">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>Especiales</span>
      </button>
      <button class="bnav" onclick="openCanjeQR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/></svg>
        <span>QR Canje</span>
      </button>
    </nav>
  </div>
</div>

<div id="mobile-overlay" class="mobile-overlay" onclick="toggleMobileMenu()"></div>
<!-- MODAL MOVIMIENTO -->
<div id="modal-compra" class="modal-overlay" style="display:none" onclick="closeModalCompra()">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-height:90dvh;overflow-y:auto">
    <div class="modal-header">
      <h3 id="mov-modal-title">Nuevo movimiento</h3>
      <button class="modal-close" onclick="closeModalCompra()">✕</button>
    </div>
    <div class="mov-type-tabs">
      <button class="mov-type-btn active" id="mtyp-sobres" onclick="setMovType('sobres')">📦 Sobres</button>
      <button class="mov-type-btn" id="mtyp-venta" onclick="setMovType('venta')">💰 Venta</button>
      <button class="mov-type-btn" id="mtyp-canje" onclick="setMovType('canje')">🔄 Canje</button>
    </div>
    <div class="modal-body" id="mov-modal-body"></div>
  </div>
</div>


<!-- SCANNER MODAL -->
<div id="modal-scanner" class="modal-overlay" style="display:none" onclick="closeScanner()">
  <div class="modal-box scanner-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>📷 Registrar figurita</h3>
      <button class="modal-close" onclick="closeScanner()">✕</button>
    </div>
    <div class="scanner-tabs">
      <button class="sc-tab active" id="tab-cam" onclick="switchScannerTab('cam')">📷 Cámara</button>
      <button class="sc-tab" id="tab-manual" onclick="switchScannerTab('manual')">⌨️ Manual</button>
    </div>

    <!-- CAM MODE -->
    <div id="sc-cam" class="sc-panel">
      <div class="cam-select-wrap" id="cam-select-wrap" style="display:none">
        <label class="cam-select-label">📷 Cámara:</label>
        <select id="cam-select" onchange="switchCamera(this.value)" class="cam-select-input"></select>
      </div>
      <div class="cam-wrap">
        <video id="sc-video" autoplay playsinline muted></video>
        <canvas id="sc-canvas" style="display:none"></canvas>
        <div class="cam-overlay">
          <div class="cam-frame"></div>
          <p class="cam-hint">Apuntá al código del dorso (ej: COL 15)</p>
        </div>
      </div>
      <div class="sc-result" id="sc-result" style="display:none"></div>
      <div class="sc-actions">
        <button class="btn-primary full" id="btn-capture" onclick="captureFrame()">📸 Capturar y leer</button>
        <button class="btn-scan-again" id="btn-again" onclick="resetCapture()" style="display:none">↩ Intentar de nuevo</button>
      </div>
      <div class="sc-status" id="sc-status">Iniciando cámara...</div>
    </div>

    <!-- MANUAL MODE -->
    <div id="sc-manual" class="sc-panel" style="display:none">
      <p class="manual-hint">Escribí el número o código de la figurita</p>
      <input type="text" id="manual-code" class="manual-input" placeholder="Ej: 14, FWC9, C1, CC3..." 
             oninput="manualSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
      <div id="manual-results" class="manual-results"></div>
    </div>
  </div>
</div>

<!-- PIN RECOVERY MODAL -->
<div id="modal-pin-recovery" class="modal-overlay" style="display:none">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px;margin:auto">
    <div class="modal-header">
      <h3>🔐 Recuperar PIN</h3>
      <button class="modal-close" onclick="closePinRecovery()">✕</button>
    </div>
    <div class="modal-body" id="pin-recovery-body"></div>
  </div>
</div>

<!-- CANJE QR MODAL -->
<div id="modal-canje-qr" class="modal-overlay" style="display:none" onclick="closeCanjeQR()">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-height:92dvh;overflow-y:auto">
    <div class="modal-header">
      <h3>🤝 Canje entre amigos</h3>
      <button class="modal-close" onclick="closeCanjeQR()">✕</button>
    </div>
    <div class="scanner-tabs">
      <button class="sc-tab active" id="qr-tab-show" onclick="switchQRTab('show')">📤 Mi QR</button>
      <button class="sc-tab" id="qr-tab-scan" onclick="switchQRTab('scan')">📷 Escanear</button>
    </div>
    <div class="modal-body" id="canje-qr-body"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="modal-confirm" class="modal-overlay" style="display:none" onclick="cancelConfirm()">
  <div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px;margin:auto">
    <div class="modal-body" style="padding:1.5rem">
      <div style="font-size:22px;text-align:center;margin-bottom:10px" id="confirm-icon">🗑️</div>
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;text-align:center" id="confirm-title"></div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:20px;white-space:pre-line" id="confirm-body"></div>
      <div style="display:flex;gap:10px">
        <button class="btn-primary full" id="confirm-cancel-btn" onclick="cancelConfirm()"
          style="background:var(--bg-card2);color:var(--text);border:1.5px solid var(--border)">Cancelar</button>
        <button class="btn-primary full" id="confirm-ok-btn" onclick="doConfirm()" style="background:var(--red)">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src='./qrcode.js'></script>
<script src='./jsqr.js'></script>
<script src='./data.js'></script>
<script src='./app.js'></script>
</body></html>
